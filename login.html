<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — LogicstIQ</title>
<meta name="robots" content="noindex,follow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--card:#FFFFFF;--text:#0F1729;--text3:#64708A;--border:#E6EAF2;--b50:#EEF1FF}
html[data-theme="dark"]{--card:#141824;--text:#EAEEF7;--text3:#8A94AB;--border:#242C3D;--b50:#171C2E}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:'Inter',system-ui,sans-serif;color:var(--text);
  background:radial-gradient(700px 360px at 85% -8%,rgba(119,11,255,.18),transparent 60%),radial-gradient(640px 380px at 5% 6%,rgba(58,85,255,.2),transparent 55%),#0A0D16}
.wrap{text-align:center;padding:24px}
.mk{width:40px;height:40px;margin:0 auto 10px;border-radius:12px;background:linear-gradient(135deg,#4F6BFF,#9B6BFF);display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Plus Jakarta Sans';font-size:20px}
h1{font-family:'Plus Jakarta Sans';font-weight:800;font-size:22px;color:#EAEEF7;margin:0 0 4px;letter-spacing:-.02em}
p{color:#8A94AB;font-size:13px;margin:0 0 18px}
.go{border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,#3A55FF,#770BFF);box-shadow:0 12px 28px rgba(58,85,255,.36)}
a.home{display:block;margin-top:16px;color:#9DB0FF;font-size:12px;text-decoration:none}
</style>
</head>
<body>
  <div class="wrap">
    <div style="margin:0 auto 10px;width:64px">
      <svg width="64" height="56" viewBox="0 0 92 80" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible" aria-hidden="true">
        <defs><linearGradient id="login_lg" x1="10" y1="70" x2="82" y2="14" gradientUnits="userSpaceOnUse"><stop stop-color="#4F6BFF"/><stop offset="1" stop-color="#9B6BFF"/></linearGradient></defs>
        <path d="M10 40 L26 40 L42 66 L64 22 L80 22" stroke="url(#login_lg)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M74 14 L82 22 L74 30" stroke="#9B6BFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="42" cy="66" r="4.5" fill="#4F6BFF"/><circle cx="64" cy="22" r="4.5" fill="#9B6BFF"/>
      </svg>
    </div>
    <h1>Logicst<span style="color:#B69BFF">IQ</span></h1>
    <p style="margin:-2px 0 14px;font-size:10.5px;letter-spacing:.04em;color:#8A94AB">WHERE LOGISTICS MEETS INTELLIGENCE</p>
    <p id="msg">Sign in or create your free account to continue.</p>
    <button class="go" id="open">Continue →</button>
    <a class="home" href="/">← Back to home</a>
  </div>
<script type="module" src="/js/liq-auth.js?v=10"></script>
<script>
  // If the magic-link completes or the user is already signed in, send them on.
  document.addEventListener("liq-auth", function(e){
    if(e.detail && e.detail.user){
      document.getElementById("msg").textContent = "Signed in — taking you to your account…";
      var next = new URLSearchParams(location.search).get("next") || "/account.html";
      setTimeout(function(){ location.href = next; }, 600);
    }
  });
  function openWall(){ if(window.LIQ) window.LIQ.openAuth(); }
  document.getElementById("open").onclick = openWall;
  // auto-open once auth module is ready and no user is present
  window.addEventListener("load", function(){
    setTimeout(function(){ if(window.LIQ && !window.LIQ.user) openWall(); }, 400);
  });
</script>
<script src="/js/liq-icons.js?v=2" defer></script>
</body>
</html>
