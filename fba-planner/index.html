<meta charset="UTF-8">

<meta name="description" content="Amazon FBA Planner: demand planning &amp; forecasting plus fulfillable vs unfulfillable inventory status — two tools, one page. Runs entirely in your browser.">

<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a;
    --text:#e8eaed; --muted:#9aa3b2; --accent:#4c8bf5; --accent2:#34d399;
  }
  /* ---- light mode ---- */
  :root[data-theme="light"]{
    --bg:#F7F9FD; --panel:#ffffff; --panel2:#eef2fb; --line:#dbe3ef;
    --text:#0b1430; --muted:#5d6a92;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;min-height:100vh;transition:background .25s,color .25s}

  /* ---- header / tab bar ---- */
  header.shell{background:var(--panel);border-bottom:1px solid var(--line);
    padding:12px 22px 0;position:sticky;top:0;z-index:20;transition:background .25s,border-color .25s}
  .shell-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
  .liq-logo{display:inline-flex;align-items:center;text-decoration:none;line-height:1;flex-shrink:0}
  .liq-logo svg{display:block}
  .liq-word{fill:var(--text);transition:fill .25s}
  .shell-title{font-size:15px;font-weight:700;color:var(--text)}
  .shell-title .sep{color:var(--muted);margin:0 8px;font-weight:400}
  .shell-title .tagline{color:var(--muted);font-size:12px;font-weight:400}
  .spacer{flex:1}
  .theme-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:16px;cursor:pointer;line-height:1;
    display:inline-grid;place-items:center;transition:.15s;flex-shrink:0}
  .theme-btn:hover{border-color:var(--accent)}
  .shell-tabs{display:flex;gap:6px}
  .shell-tabs button{background:transparent;border:0;border-bottom:2px solid transparent;
    color:var(--muted);padding:11px 20px;font-size:14.5px;font-weight:600;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:8px;transition:.15s}
  .shell-tabs button:hover{color:var(--text)}
  .shell-tabs button.on{color:var(--text);border-bottom-color:var(--accent)}
  .shell-tabs button .desc{color:var(--muted);font-weight:400;font-size:11.5px}
  .shell-tabs button.on .desc{color:var(--accent2)}

  /* ---- frame area ---- */
  .frames{flex:1;position:relative;min-height:0}
  .frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  .frames iframe.hidden{display:none}

  @media(max-width:640px){
    .shell-tabs button{padding:10px 12px;font-size:13.5px}
    .shell-tabs button .desc,.shell-title .tagline{display:none}
    .liq-logo svg{width:120px;height:auto}
  }
</style>

html{scroll-behavior:smooth}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body,.panel,.card,.calc-card,.tool-card,header,nav,.topbar,.nav,input,select,textarea,button{transition:background-color .25s ease,border-color .25s ease,color .2s ease,box-shadow .2s ease}

@keyframes lq-fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes lq-rise{from{transform:scaleY(0);opacity:.5}to{transform:scaleY(1);opacity:1}}
@keyframes lq-floatm{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes lq-pagein{from{opacity:0}to{opacity:1}}
@keyframes lq-shine{0%{transform:translateX(-160%) skewX(-18deg)}55%,100%{transform:translateX(360%) skewX(-18deg)}}
@keyframes lq-barwave{0%,100%{transform:scaleY(.7)}50%{transform:scaleY(1)}}
@keyframes lq-mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
body{animation:lq-pagein .45s ease both}
.pf-badge{animation:lq-fadeup .7s ease .10s both}
.pf-hero h1{animation:lq-fadeup .7s ease .20s both}
.pf-sub{animation:lq-fadeup .7s ease .32s both}
.pf-cta{animation:lq-fadeup .7s ease .44s both}
.pf-ticks{animation:lq-fadeup .7s ease .56s both}
.pf-card{animation:lq-fadeup .7s ease .50s both, lq-floatm 6s ease-in-out 1.4s infinite}
.pf-btn-primary{position:relative;overflow:hidden}
.pf-btn-primary::after{content:"";position:absolute;top:0;left:0;height:100%;width:38%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-160%) skewX(-18deg);animation:lq-shine 3.8s ease-in-out 1.4s infinite;pointer-events:none}
.pf-bars i{transform-origin:bottom;animation:lq-rise .8s cubic-bezier(.2,.7,.2,1) both, lq-barwave 2.8s ease-in-out 1.5s infinite}
.pf-bars i:nth-child(1){animation-delay:0.6s,1.5s}
.pf-bars i:nth-child(2){animation-delay:0.67s,1.62s}
.pf-bars i:nth-child(3){animation-delay:0.74s,1.74s}
.pf-bars i:nth-child(4){animation-delay:0.81s,1.86s}
.pf-bars i:nth-child(5){animation-delay:0.88s,1.98s}
.pf-bars i:nth-child(6){animation-delay:0.95s,2.1s}
.pf-bars i:nth-child(7){animation-delay:1.02s,2.22s}
.pf-bars i:nth-child(8){animation-delay:1.09s,2.34s}
.pf-bars i:nth-child(9){animation-delay:1.16s,2.46s}
.pf-bars i:nth-child(10){animation-delay:1.23s,2.58s}
.pf-bars i:nth-child(11){animation-delay:1.3s,2.7s}
.pf-bars i:nth-child(12){animation-delay:1.37s,2.82s}
.lq-mqtrack{display:inline-flex;align-items:center;gap:34px;white-space:nowrap;animation:lq-mq 34s linear infinite;will-change:transform}
.pf-logos:hover .lq-mqtrack{animation-play-state:paused}
.lqr{opacity:0;transform:translateY(20px);transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1)}
.lqr.lqin{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){body,.pf-badge,.pf-hero h1,.pf-sub,.pf-cta,.pf-ticks,.pf-card,.pf-bars i,.pf-btn-primary::after,.lq-mqtrack{animation:none!important}.lqr{opacity:1!important;transform:none!important;transition:none!important}}
</style>
<script id="liq-ds-js">
(function(){function init(){try{
var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
try{document.querySelectorAll('.pf-logos').forEach(function(el){if(el.dataset.lqmq)return;el.dataset.lqmq='1';var t=document.createElement('span');t.className='lq-mqtrack';while(el.firstChild){t.appendChild(el.firstChild);}t.innerHTML+=t.innerHTML;el.appendChild(t);el.style.overflow='hidden';el.style.display='block';el.style.whiteSpace='nowrap';});}catch(e){}
if(reduce)return;
var sel='.calc-card,.twd-card,.sph-card,.sxp-step,.faq-item,.play-card,.review-card,.feature-card,.tool-card,.metric-card,.stat-card,.pfeat';
var els=[].slice.call(document.querySelectorAll(sel)).filter(function(e){return !(e.closest&&e.closest('.pf-hero'));});
if(!els.length)return;
els.forEach(function(e){e.classList.add('lqr');});
if(!('IntersectionObserver' in window)){els.forEach(function(e){e.classList.add('lqin');});return;}
var io=new IntersectionObserver(function(ents){ents.forEach(function(en){if(en.isIntersecting){en.target.classList.add('lqin');io.unobserve(en.target);}});},{threshold:0.08,rootMargin:'0px 0px -6% 0px'});
els.forEach(function(e){io.observe(e);});
setTimeout(function(){els.forEach(function(e){e.classList.add('lqin');});},1800);
}catch(e){}}
if(document.readyState!=='loading')init();else document.addEventListener('DOMContentLoaded',init);})();
</script>

<script>
"use strict";
(function(){
  /* ---- theme (shared with the main site via localStorage key 'liq-theme') ---- */
  var root=document.documentElement, btn=document.getElementById("themeBtn");
  var frames=[document.getElementById("framePlanner"), document.getElementById("frameDisposition")];
  function currentTheme(){
    try{var s=localStorage.getItem("liq-theme"); if(s==="light"||s==="dark") return s;}catch(e){}
    return "dark";
  }
  function pushToFrames(t){
    frames.forEach(function(f){ try{ if(f.contentWindow) f.contentWindow.postMessage({liqTheme:t},"*"); }catch(e){} });
  }
  function setTheme(t){
    root.setAttribute("data-theme", t);
    if(btn) btn.textContent = (t==="dark") ? "🌙" : "☀️";
    try{ localStorage.setItem("liq-theme", t); }catch(e){}
    pushToFrames(t);
  }
  setTheme(currentTheme());
  if(btn) btn.addEventListener("click", function(){
    setTheme(root.getAttribute("data-theme")==="dark" ? "light" : "dark");
  });
  // when a frame finishes loading, make sure it matches the current theme
  frames.forEach(function(f){ f.addEventListener("load", function(){
    try{ f.contentWindow.postMessage({liqTheme: root.getAttribute("data-theme")},"*"); }catch(e){}
  }); });

  /* ---- tab switching ---- */
  var tabs=document.querySelectorAll("#shellTabs button");
  var byId={framePlanner:frames[0], frameDisposition:frames[1]};
  function show(id){
    var f=byId[id];
    if(f && !f.getAttribute("src") && f.dataset.src){ f.setAttribute("src", f.dataset.src); }
    Object.keys(byId).forEach(function(k){ byId[k].classList.toggle("hidden", k!==id); });
    tabs.forEach(function(b){ b.classList.toggle("on", b.dataset.frame===id); });
  }
  tabs.forEach(function(b){ b.addEventListener("click", function(){ show(b.dataset.frame); }); });
})();
</script>
